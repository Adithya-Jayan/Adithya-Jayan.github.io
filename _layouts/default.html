<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/vendor/Magnific-Popup/dist/magnific-popup.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <canvas id="vine-canvas"></canvas>
    
    {% include header.html %}
    
    <main class="main-content">
      {{ content }}
    </main>

    {% include footer.html %}
    
    <!-- Scripts -->
    <script src="{{ '/assets/js/jquery-11.0.min.js' | relative_url }}"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="{{ '/assets/vendor/isotope/isotope.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/vendor/Magnific-Popup/dist/jquery.magnific-popup.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/vines.js' | relative_url }}"></script>
    <script>
      // Scroll Reveal Logic
      document.addEventListener('DOMContentLoaded', () => {
        const observerOptions = {
          threshold: 0.1
        };
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
            }
          });
        }, observerOptions);

        document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
      });
    </script>
  </body>
</html>
