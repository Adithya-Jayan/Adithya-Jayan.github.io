<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/vendor/Magnific-Popup/dist/magnific-popup.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="noise-overlay"></div>
    
    <!-- Botanical Watermarks (Pure CSS Art) -->
    <div class="botanical-accent css-leaf" style="top: 15%; left: -30px; transform: rotate(25deg);"></div>
    <div class="botanical-accent css-leaf" style="top: 10%; right: -20px; transform: rotate(-110deg) scale(0.8);"></div>
    <div class="botanical-accent css-vine" style="top: 45%; left: 20px;"></div>
    <div class="botanical-accent css-leaf" style="bottom: 10%; left: -10px; transform: rotate(45deg) scale(1.2);"></div>
    <div class="botanical-accent css-vine" style="bottom: 20%; right: 30px; transform: rotate(15deg) scale(0.9);"></div>

    {% include header.html %}
    
    <main class="main-content">
      {{ content }}
    </main>

    <div class="ImageOverlap animate-on-scroll" aria-hidden="true">
      <img alt="Wall climber boy" src="https://res.cloudinary.com/dtml8icqh/image/upload/v1760783588/Wall-climber-boy-1_h0z0za.png">
    </div>

    {% include footer.html %}
    
    <!-- Scripts -->
    <script src="{{ '/assets/js/jquery-11.0.min.js' | relative_url }}"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="{{ '/assets/vendor/isotope/isotope.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/vendor/Magnific-Popup/dist/jquery.magnific-popup.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    <script>
      // Scroll Reveal Logic
      document.addEventListener('DOMContentLoaded', () => {
        const observerOptions = {
          threshold: 0.1
        };
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
            }
          });
        }, observerOptions);

        document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
      });
    </script>
  </body>
</html>
